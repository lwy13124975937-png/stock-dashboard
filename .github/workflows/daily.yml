name: Daily snapshot

on:
  schedule:
    # 15:40 Beijing time = 07:40 UTC, Monday-Friday.
    - cron: "40 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check private holdings secret
        id: holdings
        env:
          HOLDINGS_DATA_JSON: ${{ secrets.HOLDINGS_DATA_JSON }}
        run: |
          if [ -z "$HOLDINGS_DATA_JSON" ]; then
            echo "Missing HOLDINGS_DATA_JSON secret. Skip snapshot."
            echo "has_holdings=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_holdings=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run daily snapshot
        if: steps.holdings.outputs.has_holdings == 'true'
        env:
          HOLDINGS_DATA_JSON: ${{ secrets.HOLDINGS_DATA_JSON }}
        run: python daily_snapshot.py

      - name: Commit history files
        if: steps.holdings.outputs.has_holdings == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/
          if git diff --cached --quiet; then
            echo "No history changes."
          else
            git commit -m "Update daily snapshot"
            git push
          fi
